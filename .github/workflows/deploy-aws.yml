name: Deploy to AWS

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/abinash-github

jobs:
  # ── Job 1: Build & push client image (GitHub Actions runner) ──
  build-client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/user-management-client:latest
          build-args: |
            VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }}

  # ── Job 2: Build & push server image (GitHub Actions runner) ──
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/user-management-server:latest

  # ── Job 3: Deploy to EC2 (just pull + restart) ───────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-client, build-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/app

            # Write .env from secrets
            cat > ~/app/.env << 'ENVEOF'
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            SERVER_PORT=${{ secrets.SERVER_PORT }}
            VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }}
            ENVEOF

            # Write docker-compose using GHCR images (no build on EC2)
            cat > ~/app/docker-compose.yml << 'COMPOSEEOF'
            services:
              postgres:
                container_name: database
                image: postgres:18-alpine
                ports:
                  - "5431:5432"
                environment:
                  POSTGRES_USER: "${POSTGRES_USER}"
                  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
                  POSTGRES_DB: "${POSTGRES_DB}"
                  PGDATA: /var/lib/postgresql/data
                volumes:
                  - db_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "sh -c 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}'"]
                  interval: 5s
                  timeout: 60s
                  retries: 5
                  start_period: 80s

              server:
                container_name: server
                image: ghcr.io/abinash-github/user-management-server:latest
                ports:
                  - "7999:8000"
                environment:
                  DATABASE_URL: "${DATABASE_URL}"
                  PORT: "${SERVER_PORT}"
                depends_on:
                  postgres:
                    condition: service_healthy

              client:
                container_name: client
                image: ghcr.io/abinash-github/user-management-client:latest
                command: ["sh", "-c", "npm run preview"]
                ports:
                  - "4172:4173"
                environment:
                  VITE_SERVER_URL: "${VITE_SERVER_URL}"
                depends_on:
                  - server

            volumes:
              db_data:
            COMPOSEEOF

            # Login to GHCR and pull fresh images
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            docker pull ghcr.io/abinash-github/user-management-client:latest
            docker pull ghcr.io/abinash-github/user-management-server:latest

            # Restart containers
            cd ~/app
            docker compose --env-file .env up -d --remove-orphans
            docker image prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            echo "── Container status ──"
            docker compose ps

            echo "── Waiting for backend ──"
            for i in {1..30}; do
              if curl -sf http://127.0.0.1:7999/users/all > /dev/null 2>&1; then
                echo "✓ Backend is up"
                break
              fi
              echo "Attempt $i/30: waiting..."
              sleep 3
            done

            echo "── Waiting for frontend ──"
            for i in {1..30}; do
              if curl -sf http://127.0.0.1:4172 > /dev/null 2>&1; then
                echo "✓ Frontend is up"
                break
              fi
              echo "Attempt $i/30: waiting..."
              sleep 3
            done

      - name: Deployment summary
        if: always()
        run: |
          echo "Repository : ${{ github.repository }}"
          echo "Commit     : ${{ github.sha }}"
          echo "Frontend   : http://${{ secrets.EC2_HOST }}:4172"
          echo "Backend    : http://${{ secrets.EC2_HOST }}:7999"